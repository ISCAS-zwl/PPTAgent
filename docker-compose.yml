version: '3.8'

# 完整的 PPTAgent + Frontend 集成部署配置

services:
  # ============ DeepPresenter 核心服务 ============

  # DeepPresenter Host 容器 - 运行 AgentLoop 和 API 服务
  deeppresenter-host:
    build:
      context: ./deeppresenter
      dockerfile: docker/Host.Dockerfile
      args:
        http_proxy: ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        no_proxy: ${no_proxy:-}
    image: deeppresenter-host:0.1.0
    container_name: deeppresenter-host
    ports:
      - "4397:4397"
    environment:
      - DEEPPRESENTER_WORKSPACE_BASE=/opt/workspace
      - DEEPPRESENTER_HOST_WORKSPACE_BASE=${PWD}/workspace
      - CONFIG_FILE=/usr/src/pptagent/deeppresenter/deeppresenter/config.yaml
      - DEEPPRESENTER_LOG_LEVEL=0
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - http_proxy=${http_proxy:-}
      - https_proxy=${https_proxy:-}
      - no_proxy=${no_proxy:-localhost,127.0.0.1}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./workspace:/opt/workspace
      - ./deeppresenter:/usr/src/pptagent/deeppresenter
    networks:
      - pptagent-network
    restart: unless-stopped
    privileged: true

  # ============ 前端系统服务 ============

  # Redis - 任务队列和缓存
  redis:
    image: docker.1ms.run/library/redis:7.4.7-alpine3.21
    container_name: pptagent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - pptagent-network
    restart: unless-stopped

  # Backend - FastAPI 后端服务
  backend:
    build:
      context: ./harness/backend
      dockerfile: Dockerfile
    container_name: pptagent-backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - CORS_ORIGINS=*
      - PPTAGENT_DOCKER_URL=http://deeppresenter-host:4397
      - PPTAGENT_MODE=docker
      - PPTAGENT_WORKSPACE=/workspace
    depends_on:
      - redis
      - deeppresenter-host
    volumes:
      - ./harness/backend:/app
      - ./workspace:/workspace
    networks:
      - pptagent-network
    restart: unless-stopped

  # Frontend - Next.js 前端服务
  frontend:
    build:
      context: ./harness/frontend
      dockerfile: Dockerfile
    container_name: pptagent-frontend
    environment:
      - NEXT_PUBLIC_API_URL=
      - NEXT_PUBLIC_WS_URL=
    depends_on:
      - backend
    networks:
      - pptagent-network
    restart: unless-stopped

  # Nginx - 反向代理服务
  nginx:
    image: docker.1ms.run/library/nginx:alpine
    container_name: pptagent-nginx
    ports:
      - "4399:80"
    volumes:
      - ./harness/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - pptagent-network
    restart: unless-stopped

volumes:
  redis_data:

networks:
  pptagent-network:
    driver: bridge